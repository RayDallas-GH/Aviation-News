# MVP: Aviation Wire の RSS のみ。後から feeds に行を足して公式ソース等を追加可能。

feeds:
  - id: aviationwire
    name: Aviation Wire
    url: https://www.aviationwire.jp/feed/

# いずれかのグループにマッチしたら掲載。表示は JAL / ANA で2カラム対比。
keyword_groups:
  jal:
    - JAL
    - 日本航空
    - ZIPAIR
    - ジップエア
    - JTA
    - 日本トランスオーシャン航空
    - RAC
    - 琉球エアコミューター
    - JAC
    - 日本エアコミューター
  ana:
    - ANA
    - 全日空
    - 全日本空輸
    - ANAホールディングス

# 互換: keyword_groups が無い場合のみ使われる（通常は不要）
# keywords: []
