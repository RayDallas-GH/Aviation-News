# メーカー・eVTOL（AAM）ニュース用。フェーズ1は Aviation Wire のみ。
# feeds に RSS 行を足せば同一 industry_fetcher で複数ソース化できる（公式 RSS 等は後続）。
# 1記事は match_order の先に当たったトラックだけに入る（aam → intl_oem → jp_oem）。
# 列: jp_oem=日系航空機・エンジン関連（三菱重工は必須キーワード）, intl_oem=海外 OEM, aam=空飛ぶクルマ（件数少なめ想定で include を広めに）。

feeds:
  - id: aviationwire
    name: Aviation Wire
    url: https://www.aviationwire.jp/feed/

# 先に評価するトラックほど優先（重複時は先勝ち）
match_order: [aam, intl_oem, jp_oem]

# 記事全体に当たったら除外（エアライン運航・路線ニュースなどメーカー列に不適切なもの）
exclude:
  - デルタ航空
  - Delta Air Lines
  - Delta Air

tracks:
  jp_oem:
    label_ja: 日系メーカー
    per_track_limit: 8
    include:
      - 三菱重工
      - MHI
      - 三菱飛機
      - スペースジェット
      - SpaceJet
      - 川崎重工
      - カワサキ
      - Kawasaki
      - IHI
      - 石川島播磨
      - 航空機工業
  intl_oem:
    label_ja: 海外メーカー
    per_track_limit: 8
    include:
      - Boeing
      - ボーイング
      - Airbus
      - エアバス
      - Embraer
      - エンブラエル
      - Bombardier
      - ボンバルディア
      - COMAC
      - 中国商飛
  aam:
    label_ja: 空飛ぶクルマ
    per_track_limit: 12
    include:
      - SkyDrive
      - スカイドライブ
      - Joby
      - ジョビー
      - eVTOL
      - EVTOL
      - UAM
      - AAM
      - 空飛ぶクルマ
      - 空飛ぶ車
      - エアモビリティ
      - 都市航空モビリティ
      - Volocopter
      - ボロコプター
      - Lilium
      - Archer
      - Beta Technologies
      - Wisk
      - ジオふくろう
      - AeroMobility
      - ドローン配送
      - EHang
      - Vertical Aerospace
      - Overair
      - Supernal
      - AutoFlight
      - オートフライト
      - 空飛ぶふくろう
